version: "3.9"

services:
  my-portfolio-db:
    image: postgres:15
    container_name: my-portfolio-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_db
    ports:
      - "5433:5432"
    volumes:
      - portfolio_db_data:/var/lib/postgresql/data

volumes:
  portfolio_db_data: